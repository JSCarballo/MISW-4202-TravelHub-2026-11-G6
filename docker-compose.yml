# version está obsoleto en Docker Compose v2+ y se ignora

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus-rule.yml:/etc/prometheus/rules.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - monitoring

  # Instancia 1 del microservicio
  api-inventory-1:
    build: ./microservicio_inventario
    container_name: api-inventory-1
    ports:
      - "8001:8000"
    networks:
      - monitoring
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Instancia 2 del microservicio
  api-inventory-2:
    build: ./microservicio_inventario
    container_name: api-inventory-2
    ports:
      - "8002:8000"
    networks:
      - monitoring
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Instancia 3 del microservicio
  api-inventory-3:
    build: ./microservicio_inventario
    container_name: api-inventory-3
    ports:
      - "8003:8000"
    networks:
      - monitoring
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-reservas:
    build: ./microservicio_reservas
    container_name: api-reservas
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: booking_db
      DB_USER: bookinguser
      DB_PASSWORD: reservas_pass_123
      DB_APPLICATION_NAME: reservas-ms
    ports:
      - "8004:8000"
    networks:
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./monitoring/nginx:/etc/nginx/conf.d
    networks:
      - monitoring
    depends_on:
      - api-inventory-1
      - api-inventory-2
      - api-inventory-3

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminTravelHub
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy

networks:
  monitoring:
    driver: bridge

volumes:
  postgres_data:
